include ./dark-theme.ghostty.conf

# Font
font_family Dejavu Sans Mono Regular
font_size 15.0
bold_font auto
italic_font auto
bold_italic_font auto

# tab
tab_bar_style powerline
tab_switch_strategy last
tab_powerline_style slanted
tab_title_template "#{index}: {title.split('/')[-1]}"

copy_on_select yes
allow_remote_control yes
enable_audio_bell no
confirm_os_window_close 0
background_opacity 0.9
dynamic_background_opacity 1
linux_display_server auto

# Enabled Keybinds
# map ctrl+t combine : new_tab_with_cwd : set_tab_title " "
map ctrl+t new_tab_with_cwd
map ctrl+q close_tab
map ctrl+e previous_tab
map ctrl+o next_tab
map ctrl+y scroll_page_up
map ctrl+i scroll_page_down
# map ctrl+shift+c
# map ctrl+shift+v
# map ctrl+shift+equal
# map ctrl+shift+minus

map ctrl+1 goto_tab 1
map ctrl+r goto_tab 2
map ctrl+g goto_tab 3
map ctrl+k goto_tab 4
map ctrl+a goto_tab 5
map ctrl+f goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9
map ctrl+0 goto_tab 10

# Disabled Keybinds
map ctrl+tab
map ctrl+shift+tab
map ctrl+shift+t
map ctrl+shift+q
map ctrl+shift+s
map ctrl+shift+o
map ctrl+shift+u
map ctrl+shift+e
map ctrl+shift+a
map ctrl+shift+r
map ctrl+shift+d
map ctrl+shift+enter
map ctrl+shift+w
map ctrl+shift+[
map ctrl+shift+]
map ctrl+shift+f
map ctrl+shift+b
map ctrl+shift+l
map ctrl+shift+n
map ctrl+shift+f7
map ctrl+shift+f8
