include ./dark-theme.ghostty.conf

# Font
font_family Dejavu Sans Mono Regular
font_size 15.0
bold_font auto
italic_font auto
bold_italic_font auto

# tab
tab_bar_style powerline
tab_switch_strategy last
tab_powerline_style slanted
tab_title_template "#{index}: {title.split('/')[-1]}"

copy_on_select yes
allow_remote_control yes
enable_audio_bell no
confirm_os_window_close 0
background_opacity 0.9
dynamic_background_opacity 1
linux_display_server auto
clear_all_shortcuts yes

# Enabled Keybinds
# map ctrl+t combine : new_tab_with_cwd : set_tab_title " "
map ctrl+t new_tab_with_cwd
map ctrl+q close_tab
map ctrl+e previous_tab
map ctrl+o next_tab
map ctrl+y scroll_page_up
map ctrl+i scroll_page_down
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+equal change_font_size +1.0
map ctrl+shift+minus change_font_size -1.0

map ctrl+1 goto_tab 1
map ctrl+r goto_tab 2
map ctrl+g goto_tab 3
map ctrl+k goto_tab 4
map ctrl+a goto_tab 5
map ctrl+f goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9
map ctrl+0 goto_tab 10
